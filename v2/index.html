<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gun4Fun: Jungle Fury</title>
    
    <meta property="og:title" content="Gun4Fun: Jungle Fury">
    <meta property="og:description" content="Misión 2: Operación Jungle Fury. Entrenamiento táctico avanzado.">
    <meta property="og:image" content="https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/portada2.jpg">
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style> 
        body { margin: 0; background: #1a2f1a; overflow: hidden; touch-action: none; } 
    </style>
</head>
<body>
<script>
    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let player, enemies, bullets, enemyBullets, score = 0, scoreText, missionText, hearts, lives = 3;
    let isFiring = false, lastFired = 0;
    
    // VARIABLES DE AUDIO
    let bgMusic, sfxDisparo, sfxSoldado, sfxTigre, sfxSerpiente;
    let musicStarted = false;

    // CONSTANTES TÁCTICAS
    const CONTROL_PANEL_HEIGHT = 250; 
    const PLAYER_V_OFFSET = 320;     
    const FIRE_RATE = 450; 

    function preload() {
        // Imágenes desde Assets de GitHub
        this.load.image('jungla', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/fondo_jungla.jpg');
        this.load.image('soldado', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/soldado_player.png');
        this.load.image('enemigo_soldado', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/soldado_enemigo.png');
        this.load.image('tigre', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/tigre.png');
        this.load.image('serpiente', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/serpiente.png');
        this.load.image('bala', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/bala.png');
        this.load.image('bala_roja', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/bala_roja.png');
        this.load.image('corazon', 'https://cdn-icons-png.flaticon.com/512/833/833472.png');
        
        // Audio desde Assets de GitHub
        this.load.audio('musica_fondo', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/musica_jungla.mp3');
        this.load.audio('sfx_disparo', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/disparo.mp3');
        this.load.audio('sfx_soldado', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_soldado.mp3');
        this.load.audio('sfx_tigre', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_tigre.mp3');
        this.load.audio('sfx_serpiente', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_serpiente.mp3');
    }

    function create() {
        this.add.image(window.innerWidth/2, window.innerHeight/2, 'jungla').setDisplaySize(window.innerWidth, window.innerHeight);
        
        // Inicializar Sonidos
        bgMusic = this.sound.add('musica_fondo', { volume: 0.4, loop: true });
        sfxDisparo = this.sound.add('sfx_disparo', { volume: 0.3 });
        sfxSoldado = this.sound.add('sfx_soldado', { volume: 0.6 });
        sfxTigre = this.sound.add('sfx_tigre', { volume: 0.6 });
        sfxSerpiente = this.sound.add('sfx_serpiente', { volume: 0.6 });

        player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight - PLAYER_V_OFFSET, 'soldado');
        player.setScale(0.8).setCollideWorldBounds(true);
        player.setBodySize(player.width * 0.2, player.height * 0.4, true); 

        bullets = this.physics.add.group({ defaultKey: 'bala' });
        enemyBullets = this.physics.add.group({ defaultKey: 'bala_roja' });
        enemies = this.physics.add.group();

        // UI TÁCTICA
        scoreText = this.add.text(20, 20, 'BAJAS: 0', { fontSize: '24px', fill: '#fff', stroke: '#000', strokeThickness: 4 });
        missionText = this.add.text(20, 50, 'MISIÓN: JUNGLE FURY', { fontSize: '14px', fill: '#00ff00', fontStyle: 'bold' });

        hearts = this.add.group();
        actualizarCorazones.call(this);

        this.physics.add.overlap(bullets, enemies, hitEnemy, null, this);
        this.physics.add.overlap(player, enemies, takeDamage, null, this);
        this.physics.add.overlap(player, enemyBullets, takeDamage, null, this);

        this.time.addEvent({ delay: 1000, callback: spawnManager, callbackScope: this, loop: true });

        // Activar música y disparo
        this.input.on('pointerdown', (p) => { 
            if (p.y > window.innerHeight - CONTROL_PANEL_HEIGHT) {
                isFiring = true; 
                if (!musicStarted) { bgMusic.play(); musicStarted = true; }
            }
        });
        this.input.on('pointerup', () => { isFiring = false; });
        this.input.on('pointermove', (p) => {
            if (p.y > window.innerHeight - CONTROL_PANEL_HEIGHT) player.x = p.x;
        });
    }

    function update(time) {
        if (isFiring && time > lastFired) {
            fireBullet.call(this);
            lastFired = time + FIRE_RATE;
        }
        bullets.children.each(b => { if (b.active && b.y < -50) b.destroy(); });
        enemyBullets.children.each(eb => { if (eb.active && eb.y > window.innerHeight + 50) eb.destroy(); });
        enemies.children.each(e => { if (e.active && e.y > window.innerHeight + 50) e.destroy(); });
    }

    function fireBullet() {
        let b = bullets.get(player.x, player.y - 45);
        if (b) {
            b.setActive(true).setVisible(true).setScale(0.18);
            b.body.velocity.y = -850;
            b.setBodySize(b.width * 0.2, b.height * 0.2, true);
            sfxDisparo.play();
        }
    }

    function spawnManager() {
        const tiposBase = ['enemigo_soldado', 'tigre', 'serpiente'];
        const t = tiposBase[Math.floor(Math.random() * 3)];
        spawnEnemy.call(this, t);
        if (t === 'enemigo_soldado' || Math.random() > 0.7) {
            spawnEnemy.call(this, 'enemigo_soldado');
            spawnEnemy.call(this, 'enemigo_soldado');
        }
    }

    function spawnEnemy(tipo) {
        const x = Phaser.Math.Between(80, window.innerWidth - 80);
        let enemy = enemies.create(x, -50, tipo).setScale(0.7);
        enemy.tipoEnemigo = tipo; 
        enemy.setBodySize(enemy.width * 0.25, enemy.height * 0.3, true);
        
        if (tipo === 'enemigo_soldado') {
            enemy.setVelocityY(120);
            
            // INTELIGENCIA DE MOVIMIENTO ALEATORIO
            const dir = Math.random() < 0.5 ? -1 : 1;
            const amp = Phaser.Math.Between(50, 150) * dir;
            const vel = Phaser.Math.Between(1200, 2800);

            this.tweens.add({
                targets: enemy,
                x: enemy.x + amp,
                duration: vel,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut'
            });

            // Disparo enemigo individual
            this.time.addEvent({
                delay: Phaser.Math.Between(1600, 2600),
                callback: () => {
                    if (enemy.active) {
                        let eb = enemyBullets.create(enemy.x, enemy.y + 20, 'bala_roja');
                        if (eb) { eb.setScale(0.18).setVelocityY(480); eb.setBodySize(eb.width * 0.2, eb.height * 0.2, true); }
                    }
                }, loop: true
            });
        } else if (tipo === 'tigre') {
            enemy.setVelocityY(420);
        } else if (tipo === 'serpiente') {
            enemy.setVelocityY(180);
            this.tweens.add({ targets: enemy, x: enemy.x + 70, duration: 500, yoyo: true, repeat: -1 });
        }
    }

    function hitEnemy(b, e) {
        // SFX de muerte según tipo
        if (e.tipoEnemigo === 'enemigo_soldado') sfxSoldado.play();
        else if (e.tipoEnemigo === 'tigre') sfxTigre.play();
        else if (e.tipoEnemigo === 'serpiente') sfxSerpiente.play();

        b.destroy(); e.destroy();
        score += 10;
        scoreText.setText('BAJAS: ' + score);
    }

    function takeDamage(p, obj) {
        obj.destroy();
        lives--;
        actualizarCorazones.call(this);
        player.setTint(0xff0000);
        this.time.delayedCall(200, () => player.clearTint());
        if (lives <= 0) { if (bgMusic) bgMusic.stop(); endGame.call(this); }
    }

    function actualizarCorazones() {
        hearts.clear(true, true);
        for (let i = 0; i < lives; i++) {
            hearts.create(window.innerWidth - 40 - (i * 35), 35, 'corazon').setScale(0.05);
        }
    }

    function endGame() {
        this.physics.pause();
        saveScore(score);
        let ranking = getRanking();
        let text = `OPERACIÓN FALLIDA\n\nBAJAS: ${score}\n\nTOP 5:\n`;
        ranking.forEach((s, i) => { text += `${i+1}. ${s} pts\n`; });
        this.add.text(window.innerWidth/2, window.innerHeight/2, text, { 
            fontSize: '22px', fill: '#fff', backgroundColor: '#000', padding: 20, align: 'center'
        }).setOrigin(0.5);
        this.time.delayedCall(4000, () => location.reload());
    }

    function saveScore(newScore) {
        let scores = JSON.parse(localStorage.getItem('gun4fun_ranking')) || [];
        scores.push(newScore); scores.sort((a, b) => b - a);
        localStorage.setItem('gun4fun_ranking', JSON.stringify(scores.slice(0, 5)));
    }

    function getRanking() { return JSON.parse(localStorage.getItem('gun4fun_ranking')) || []; }
</script>
</body>
</html>
