<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gun4Fun: Jungle Fury</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style> 
        body { margin: 0; background: #1a2f1a; overflow: hidden; touch-action: none; } 
    </style>
</head>
<body>
<script>

/**
 * BLOQUE 1: CONFIGURACIÓN Y VARIABLES
 */
// Configuración Firebase (Ranking Global)
const FIREBASE_DB_URL = "https://gun4fun-ranking-default-rtdb.europe-west1.firebasedatabase.app/ranking.json";
const urlParams = new URLSearchParams(window.location.search);
const userName = urlParams.get('user') || 'Soldado';

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, enemies, bullets, enemyBullets, pickups, score = 0, scoreText, missionText, hearts, lives = 3;
let isFiring = false, lastFired = 0, isInvulnerable = false, shieldAura; // Variables Escudo
let bgMusic, sfxDisparo, sfxSoldado, sfxTigre, sfxSerpiente;
let musicStarted = false;

const CONTROL_PANEL_HEIGHT = 200; 
const PLAYER_V_OFFSET = 320;     
const FIRE_RATE = 450; 

/**
 * BLOQUE 2: GESTIÓN DE ACTIVOS
 */
function preload() {
    this.load.image('jungla', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/fondo_jungla.jpg');
    this.load.image('bala', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/bala.png');
    this.load.image('bala_roja', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/bala_roja.png');
    this.load.image('corazon', 'https://cdn-icons-png.flaticon.com/512/833/833472.png');
    // CAMBIO 1: Nuevo icono de escudo azul (Corregido el "dedo arriba")
    this.load.image('escudo', 'https://cdn-icons-png.flaticon.com/512/2091/2091665.png'); 

    this.load.spritesheet('serpiente_anim', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/serpiente.png', { frameWidth: 256, frameHeight: 256 });
    this.load.spritesheet('soldado_p', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/soldado_player.png', { frameWidth: 180, frameHeight: 256, margin: 10, spacing: 0 });
    this.load.spritesheet('enemigo_s', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/soldado_enemigo.png', { frameWidth: 220, frameHeight: 256, margin: 15, spacing: 0 });
    this.load.spritesheet('tigre_s', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/tigre.png', { frameWidth: 220, frameHeight: 256, margin: 15, spacing: 0 });
    
    this.load.audio('musica_fondo', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/musica_jungla.mp3');
    this.load.audio('sfx_disparo', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/disparo.mp3');
    this.load.audio('sfx_soldado', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_soldado.mp3');
    this.load.audio('sfx_tigre', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_tigre.mp3');
    this.load.audio('sfx_serpiente', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_serpiente.mp3');
}

/**
 * BLOQUE 3: INICIALIZACIÓN
 */
function create() {
    this.add.image(window.innerWidth/2, window.innerHeight/2, 'jungla').setDisplaySize(window.innerWidth, window.innerHeight);
    bgMusic = this.sound.add('musica_fondo', { volume: 0.4, loop: true });
    sfxDisparo = this.sound.add('sfx_disparo', { volume: 0.3 });
    sfxSoldado = this.sound.add('sfx_soldado', { volume: 0.6 });
    sfxTigre = this.sound.add('sfx_tigre', { volume: 0.6 });
    sfxSerpiente = this.sound.add('sfx_serpiente', { volume: 0.6 });

    const panelUI = this.add.graphics();
    panelUI.fillStyle(0x222222, 0.7);
    panelUI.fillRect(0, window.innerHeight - CONTROL_PANEL_HEIGHT, window.innerWidth, CONTROL_PANEL_HEIGHT);
    panelUI.lineStyle(4, 0x444444, 1);
    panelUI.lineBetween(0, window.innerHeight - CONTROL_PANEL_HEIGHT, window.innerWidth, window.innerHeight - CONTROL_PANEL_HEIGHT);

    const arrowY = window.innerHeight - (CONTROL_PANEL_HEIGHT / 2);
    panelUI.fillStyle(0x888888, 0.5);
    panelUI.fillTriangle(30, arrowY, 60, arrowY - 25, 60, arrowY + 25);
    panelUI.fillTriangle(window.innerWidth - 30, arrowY, window.innerWidth - 60, arrowY - 25, window.innerWidth - 60, arrowY + 25);

    // CAMBIO 2: Letras del panel más grandes y centradas verticalmente en el cuadro
    this.add.text(window.innerWidth/2, window.innerHeight - (CONTROL_PANEL_HEIGHT / 2), 'ZONA DE CONTROL TÁCTICO', { 
        fontSize: '22px', 
        fill: '#ffffff', 
        fontStyle: 'bold',
        alpha: 0.6
    }).setOrigin(0.5);

    this.anims.create({ key: 'walk_player', frames: this.anims.generateFrameNumbers('soldado_p', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
    this.anims.create({ key: 'walk_enemy', frames: this.anims.generateFrameNumbers('enemigo_s', { start: 0, end: 3 }), frameRate: 8, repeat: -1 });
    this.anims.create({ key: 'run_tiger', frames: this.anims.generateFrameNumbers('tigre_s', { start: 0, end: 3 }), frameRate: 12, repeat: -1 });
    this.anims.create({ key: 'reptar_snake', frames: this.anims.generateFrameNumbers('serpiente_anim', { start: 0, end: 3 }), frameRate: 8, repeat: -1 });

    player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight - PLAYER_V_OFFSET, 'soldado_p');
    player.setScale(0.8).setCollideWorldBounds(true).play('walk_player');
    player.setBodySize(player.width * 0.25, player.height * 0.4, true); 
    player.setOffset(65, 100); 

    // Aura visual del escudo
    shieldAura = this.add.circle(player.x - 15, player.y, 80, 0x00ffff, 0.3).setVisible(false);

    bullets = this.physics.add.group({ defaultKey: 'bala' });
    enemyBullets = this.physics.add.group({ defaultKey: 'bala_roja' });
    enemies = this.physics.add.group();
    pickups = this.physics.add.group(); 

    scoreText = this.add.text(20, 20, `${userName.toUpperCase()}: 0`, { fontSize: '24px', fill: '#fff', stroke: '#000', strokeThickness: 4 });
    missionText = this.add.text(20, 50, 'MISIÓN: JUNGLE FURY ELITE', { fontSize: '14px', fill: '#00ff00', fontStyle: 'bold' });
    hearts = this.add.group();
    actualizarCorazones.call(this);

    this.time.addEvent({ delay: 2500, callback: spawnManager, callbackScope: this, loop: true });

    this.input.on('pointerdown', (p) => { 
        if (p.y > window.innerHeight - CONTROL_PANEL_HEIGHT) {
            isFiring = true; 
            if (!musicStarted) { bgMusic.play(); musicStarted = true; }
        }
    });
    this.input.on('pointerup', () => { isFiring = false; });
    this.input.on('pointermove', (p) => {
        if (p.y > window.innerHeight - CONTROL_PANEL_HEIGHT) player.x = p.x;
    });

    this.physics.add.overlap(bullets, enemies, hitEnemy, null, this);
    this.physics.add.overlap(player, enemies, takeDamage, null, this);
    this.physics.add.overlap(player, enemyBullets, takeDamage, null, this);
    this.physics.add.overlap(player, pickups, collectPickup, null, this);
}

/**
 * BLOQUE 4: GESTIÓN DE ENEMIGOS Y DIFICULTAD
 */
function spawnManager() {
    let nivelDificultad = Math.min(Math.floor(score / 50), 15);
    let randomSpawn = Math.random() * 100;

    if (randomSpawn < 35) { 
        let cantidad = Phaser.Math.Between(5, 10);
        for(let i=0; i<cantidad; i++){
            this.time.delayedCall(i * 200, () => { spawnEnemy.call(this, 'enemigo_soldado', nivelDificultad); });
        }
    } else {
        let tipo = randomSpawn < 75 ? 'enemigo_soldado' : (randomSpawn < 88 ? 'tigre' : 'serpiente');
        spawnEnemy.call(this, tipo, nivelDificultad);
    }
}

function spawnEnemy(tipo, nivel) {
    const x = Phaser.Math.Between(80, window.innerWidth - 80);
    let enemy = enemies.create(x, -50, tipo === 'enemigo_soldado' ? 'enemigo_s' : (tipo === 'tigre' ? 'tigre_s' : 'serpiente_anim')).setScale(0.7);
    enemy.tipoEnemigo = tipo;
    enemy.health = 1; 

    if (tipo === 'enemigo_soldado') {
        enemy.play('walk_enemy');
        enemy.setVelocityY(120 + (nivel * 5));
        
        // IA DE MOVIMIENTO MÁS REAL (Seno suavizado)
        let targetX = Phaser.Math.Clamp(enemy.x + Phaser.Math.Between(-150, 150), 60, window.innerWidth - 60);
        this.tweens.add({ targets: enemy, x: targetX, duration: Phaser.Math.Between(1500, 3000), yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

        // DISPARO CON APUNTADO AL JUGADOR
        this.time.addEvent({ 
            delay: Math.max(Phaser.Math.Between(1600, 2600) - (nivel * 110), 800), 
            callback: () => { 
                if (enemy.active && player.active) { 
                    let eb = enemyBullets.get(enemy.x, enemy.y + 40); 
                    if (eb) {
                        eb.setActive(true).setVisible(true).setScale(0.18);
                        // Cálculo de ángulo hacia el jugador
                        let angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
                        this.physics.velocityFromRotation(angle, 480 + (nivel * 8), eb.body.velocity);
                        eb.setRotation(angle + Math.PI/2);
                        eb.body.setSize(eb.width * 0.4, eb.height * 0.4);
                    }
                } 
            }, 
            loop: true 
        });
    } else if (tipo === 'tigre') {
        enemy.play('run_tiger').setVelocityY(420 + (nivel * 10));
        enemy.setBodySize(enemy.width * 0.4, enemy.height * 0.5, true);
    } else {
        enemy.play('reptar_snake').setVelocityY(180 + (nivel * 5));
        this.tweens.add({ targets: enemy, x: Phaser.Math.Clamp(enemy.x + 70, 60, window.innerWidth - 60), duration: 500, yoyo: true, repeat: -1 });
        enemy.setBodySize(enemy.width * 0.3, enemy.height * 0.4, true);
    }
}

/**
 * BLOQUE 5: COMBATE Y ITEMS
 */
function hitEnemy(b, e) {
    b.destroy();
    if (e.tipoEnemigo === 'enemigo_soldado') sfxSoldado.play();
    else if (e.tipoEnemigo === 'tigre') sfxTigre.play();
    else sfxSerpiente.play();

    // Feedback visual al impactar
    e.setTint(0xffffff);
    this.time.delayedCall(50, () => { if(e.active) e.clearTint(); });

    // Probabilidades de Items
    let rand = Math.random();
    if (rand < 0.01) { // Corazón
        let h = pickups.create(e.x, e.y, 'corazon').setScale(0.06);
        h.setVelocityY(100);
    } else if (rand < 0.03) { // Escudo (2% probabilidad)
        // CAMBIO 1.2: Ajustado el tamaño para que se vea mejor al caer
        let s = pickups.create(e.x, e.y, 'escudo').setScale(0.1).setVelocityY(100);
        s.isShield = true;
    }

    e.destroy();
    score += 10;
    scoreText.setText(`${userName.toUpperCase()}: ${score}`);
}

function takeDamage(p, obj) {
    if (isInvulnerable) return; // Si hay escudo, no hace nada

    obj.destroy();
    lives--;
    actualizarCorazones.call(this);
    
    // Feedback de daño: Shake e inmersión
    this.cameras.main.shake(200, 0.01);
    player.setTint(0xff0000);
    this.time.delayedCall(200, () => player.clearTint());
    
    if (lives <= 0) endGame.call(this);
}

function collectPickup(p, item) {
    if (item.isShield) {
        activarEscudo.call(this);
    } else if (lives < 3) {
        lives++;
        actualizarCorazones.call(this);
    }
    item.destroy();
}

function activarEscudo() {
    isInvulnerable = true;
    shieldAura.setVisible(true);
    player.setTint(0x00ffff);
    this.time.delayedCall(10000, () => { // 10 segundos de escudo
        isInvulnerable = false;
        shieldAura.setVisible(false);
        player.clearTint();
    });
}

/**
 * BLOQUE 6: UI Y FINAL
 */
async function syncRankingFirebase(finalScore) {
    try {
        await fetch(FIREBASE_DB_URL, {
            method: 'POST',
            body: JSON.stringify({ name: userName, score: finalScore, date: Date.now() })
        });
        const response = await fetch(FIREBASE_DB_URL);
        const data = await response.json();
        return Object.values(data).sort((a, b) => b.score - a.score).slice(0, 5);
    } catch (e) { return []; }
}

function update(time) {
    if (isFiring && time > lastFired) {
        // AJUSTE DE PRECISIÓN: Movido a la izquierda (+28 en lugar de +45) para alinear con el arma
        let b = bullets.get(player.x + 45, player.y - 110); 
        if (b) { 
            b.setActive(true).setVisible(true).setScale(0.18).setVelocityY(-850); 
            sfxDisparo.play(); 
            b.body.setSize(b.width * 0.5, b.height * 0.5);
            // CAMBIO 3: Destello alineado exactamente con la nueva posición de la bala (X+28)
            let flash = this.add.circle(player.x + 30, player.y - 110, 15, 0xffff00);
            this.time.delayedCall(40, () => flash.destroy());
        }
        lastFired = time + FIRE_RATE;
    }

    // El aura sigue al jugador
    if (shieldAura) { shieldAura.x = player.x + 15; shieldAura.y = player.y; }

    enemies.children.each(e => {
        if (e.active) {
            if (e.x < 40) e.x = 40;
            if (e.x > window.innerWidth - 40) e.x = window.innerWidth - 40;
        }
    });

    [bullets, enemyBullets, enemies, pickups].forEach(group => {
        group.children.each(c => { if (c.active && (c.y < -100 || c.y > window.innerHeight + 100)) c.destroy(); });
    });
}

function actualizarCorazones() {
    hearts.clear(true, true);
    for (let i = 0; i < lives; i++) hearts.create(window.innerWidth - 40 - (i * 35), 35, 'corazon').setScale(0.05);
}

async function endGame() {
    this.physics.pause();
    if (bgMusic) bgMusic.stop();

    // Sincronización con Firebase
    const top5Global = await syncRankingFirebase(score);
    
    // Ranking local como backup
    let localScores = JSON.parse(localStorage.getItem('gun4fun_ranking')) || [];
    localScores.push(score); localScores.sort((a, b) => b - a);
    localStorage.setItem('gun4fun_ranking', JSON.stringify(localScores.slice(0, 5)));

    let rankingMostrado = top5Global.length > 0 ? top5Global.map((s, i) => `${i+1}. ${s.name}: ${s.score}`).join('\n') : localScores.slice(0,5).map((s, i) => `${i+1}. ${s} pts`).join('\n');

    let text = `OPERACIÓN FALLIDA\n\nBAJAS: ${score}\n\nTOP 5 GLOBAL:\n` + rankingMostrado;
    
    this.add.rectangle(window.innerWidth/2, window.innerHeight/2, 450, 550, 0x000000, 0.85).setOrigin(0.5);
    this.add.text(window.innerWidth/2, window.innerHeight/2 - 40, text, { fontSize: '20px', fill: '#00ff00', align: 'center', lineSpacing: 8 }).setOrigin(0.5);
    
    const btnRetry = this.add.text(window.innerWidth/2, window.innerHeight/2 + 200, ' VOLVER A INTENTAR ', { fontSize: '28px', fill: '#000', backgroundColor: '#00ff00', padding: { x: 20, y: 10 }, fontStyle: 'bold' }).setOrigin(0.5).setInteractive();
    btnRetry.on('pointerdown', () => location.reload());
}

</script>
</body>
</html>
