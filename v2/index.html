<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gun4Fun: Jungle Fury</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style> 
        body { margin: 0; background: #1a2f1a; overflow: hidden; touch-action: none; } 
    </style>
</head>
<body>
<script>

/**
 * BLOQUE 1: CONFIGURACIÓN
 */
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, enemies, bullets, enemyBullets, score = 0, scoreText, missionText, hearts, lives = 3;
let isFiring = false, lastFired = 0;
let bgMusic, sfxDisparo, sfxSoldado, sfxTigre, sfxSerpiente;
let musicStarted = false;

const CONTROL_PANEL_HEIGHT = 250; 
const PLAYER_V_OFFSET = 320;     
const FIRE_RATE = 450; 

/**
 * BLOQUE 2: CARGA DE ACTIVOS
 */
function preload() {
    this.load.image('jungla', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/fondo_jungla.jpg');
    this.load.image('bala', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/bala.png');
    this.load.image('bala_roja', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/bala_roja.png');
    this.load.image('corazon', 'https://cdn-icons-png.flaticon.com/512/833/833472.png');

    // Mantenemos la configuración que le funcionaba para soldados y tigres
    this.load.spritesheet('soldado_p', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/soldado_player.png', { frameWidth: 180, frameHeight: 256 });
    this.load.spritesheet('enemigo_s', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/soldado_enemigo.png', { frameWidth: 220, frameHeight: 256 });
    this.load.spritesheet('tigre_s', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/tigre.png', { frameWidth: 220, frameHeight: 256 });
    
    // CARGA DE SERPIENTE: Configurada para spritesheet de 4 frames (256x256 cada uno)
    this.load.spritesheet('serpiente_s', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/serpiente.png', { frameWidth: 256, frameHeight: 256 });
    
    this.load.audio('musica_fondo', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/musica_jungla.mp3');
    this.load.audio('sfx_disparo', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/disparo.mp3');
    this.load.audio('sfx_soldado', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_soldado.mp3');
    this.load.audio('sfx_tigre', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_tigre.mp3');
    this.load.audio('sfx_serpiente', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_serpiente.mp3');
}

/**
 * BLOQUE 3: CREACIÓN
 */
function create() {
    this.add.image(window.innerWidth/2, window.innerHeight/2, 'jungla').setDisplaySize(window.innerWidth, window.innerHeight);
    
    bgMusic = this.sound.add('musica_fondo', { volume: 0.4, loop: true });
    sfxDisparo = this.sound.add('sfx_disparo', { volume: 0.3 });
    sfxSoldado = this.sound.add('sfx_soldado', { volume: 0.6 });
    sfxTigre = this.sound.add('sfx_tigre', { volume: 0.6 });
    sfxSerpiente = this.sound.add('sfx_serpiente', { volume: 0.6 });

    // Definición de animaciones
    this.anims.create({ key: 'walk_p', frames: this.anims.generateFrameNumbers('soldado_p', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
    this.anims.create({ key: 'walk_e', frames: this.anims.generateFrameNumbers('enemigo_s', { start: 0, end: 3 }), frameRate: 8, repeat: -1 });
    this.anims.create({ key: 'run_t', frames: this.anims.generateFrameNumbers('tigre_s', { start: 0, end: 3 }), frameRate: 12, repeat: -1 });
    this.anims.create({ key: 'reptar_s', frames: this.anims.generateFrameNumbers('serpiente_s', { start: 0, end: 3 }), frameRate: 8, repeat: -1 });

    player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight - PLAYER_V_OFFSET, 'soldado_p').setScale(0.8).play('walk_p');
    player.setCollideWorldBounds(true).setBodySize(player.width * 0.3, player.height * 0.5, true); 

    bullets = this.physics.add.group({ defaultKey: 'bala' });
    enemyBullets = this.physics.add.group({ defaultKey: 'bala_roja' });
    enemies = this.physics.add.group();

    scoreText = this.add.text(20, 20, 'BAJAS: 0', { fontSize: '24px', fill: '#fff', stroke: '#000', strokeThickness: 4 });
    hearts = this.add.group();
    actualizarCorazones.call(this);

    this.time.addEvent({ delay: 1000, callback: spawnManager, callbackScope: this, loop: true });

    this.input.on('pointerdown', (p) => { 
        if (p.y > window.innerHeight - CONTROL_PANEL_HEIGHT) {
            isFiring = true; 
            if (!musicStarted) { bgMusic.play(); musicStarted = true; }
        }
    });
    this.input.on('pointerup', () => { isFiring = false; });
    this.input.on('pointermove', (p) => { if (p.y > window.innerHeight - CONTROL_PANEL_HEIGHT) player.x = p.x; });

    this.physics.add.overlap(bullets, enemies, hitEnemy, null, this);
    this.physics.add.overlap(player, enemies, takeDamage, null, this);
    this.physics.add.overlap(player, enemyBullets, takeDamage, null, this);
}

/**
 * BLOQUE 4: GESTIÓN DE ENEMIGOS
 */
function spawnManager() {
    const tipos = ['soldado', 'tigre', 'serpiente'];
    const t = tipos[Phaser.Math.Between(0, 2)];
    spawnEnemy.call(this, t);
}

function spawnEnemy(tipo) {
    const x = Phaser.Math.Between(80, window.innerWidth - 80);
    let enemy;

    if (tipo === 'soldado') {
        enemy = enemies.create(x, -50, 'enemigo_s').setScale(0.7).play('walk_e').setVelocityY(120);
        this.time.addEvent({
            delay: 2000, callback: () => {
                if (enemy.active) {
                    let eb = enemyBullets.get(enemy.x, enemy.y + 40, 'bala_roja');
                    if (eb) eb.setActive(true).setVisible(true).setScale(0.18).setVelocityY(480);
                }
            }, loop: true
        });
    } else if (tipo === 'tigre') {
        enemy = enemies.create(x, -50, 'tigre_s').setScale(0.7).play('run_t').setVelocityY(420);
    } else {
        // La serpiente ahora usa su animación de reptar
        enemy = enemies.create(x, -50, 'serpiente_s').setScale(0.7).play('reptar_s').setVelocityY(180);
        this.tweens.add({ targets: enemy, x: enemy.x + 70, duration: 600, yoyo: true, repeat: -1 });
    }
    
    if (enemy) {
        enemy.tipoEnemigo = tipo;
        enemy.setBodySize(enemy.width * 0.4, enemy.height * 0.4, true);
    }
}

function hitEnemy(b, e) {
    if (e.tipoEnemigo === 'soldado') sfxSoldado.play();
    else if (e.tipoEnemigo === 'tigre') sfxTigre.play();
    else sfxSerpiente.play();
    b.destroy(); e.destroy();
    score += 10; scoreText.setText('BAJAS: ' + score);
}

function takeDamage(p, obj) {
    obj.destroy();
    lives--;
    actualizarCorazones.call(this);
    player.setTint(0xff0000);
    this.time.delayedCall(200, () => player.clearTint());
    if (lives <= 0) endGame.call(this);
}

function update(time) {
    if (isFiring && time > lastFired) {
        let b = bullets.get(player.x, player.y - 60);
        if (b) { b.setActive(true).setVisible(true).setScale(0.18).setVelocityY(-850); sfxDisparo.play(); }
        lastFired = time + FIRE_RATE;
    }
    bullets.children.each(b => { if (b.active && b.y < -50) b.destroy(); });
    enemyBullets.children.each(eb => { if (eb.active && eb.y > window.innerHeight + 50) eb.destroy(); });
    enemies.children.each(e => { if (e.active && e.y > window.innerHeight + 50) e.destroy(); });
}

function actualizarCorazones() {
    hearts.clear(true, true);
    for (let i = 0; i < lives; i++) {
        hearts.create(window.innerWidth - 40 - (i * 35), 35, 'corazon').setScale(0.05);
    }
}

function endGame() {
    this.physics.pause();
    if (bgMusic) bgMusic.stop();
    this.add.text(window.innerWidth/2, window.innerHeight/2, `OPERACIÓN FALLIDA\nBAJAS: ${score}`, { fontSize: '24px', fill: '#fff', backgroundColor: '#000', padding: 20, align: 'center' }).setOrigin(0.5);
    this.time.delayedCall(3000, () => location.reload());
}
</script>
</body>
</html>
