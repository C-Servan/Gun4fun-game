<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gun4Fun: Jungle Fury</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style> 
        body { margin: 0; background: #1a2f1a; overflow: hidden; touch-action: none; } 
    </style>
</head>
<body>
<script>

/**
 * BLOQUE 1: CONFIGURACIÓN Y VARIABLES
 */
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, enemies, bullets, enemyBullets, pickups, score = 0, scoreText, missionText, hearts, lives = 3;
let isFiring = false, lastFired = 0;
let bgMusic, sfxDisparo, sfxSoldado, sfxTigre, sfxSerpiente;
let musicStarted = false;

const CONTROL_PANEL_HEIGHT = 250; // Altura de la zona táctica
const PLAYER_V_OFFSET = 320;     
const FIRE_RATE = 450; 

/**
 * BLOQUE 2: GESTIÓN DE ACTIVOS
 */
function preload() {
    this.load.image('jungla', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/fondo_jungla.jpg');
    this.load.image('bala', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/bala.png');
    this.load.image('bala_roja', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/bala_roja.png');
    this.load.image('corazon', 'https://cdn-icons-png.flaticon.com/512/833/833472.png');

    this.load.spritesheet('serpiente_anim', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/serpiente.png', { 
        frameWidth: 256, frameHeight: 256 
    });

    this.load.spritesheet('soldado_p', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/soldado_player.png', { 
        frameWidth: 180, frameHeight: 256, margin: 10, spacing: 0
    });
    
    this.load.spritesheet('enemigo_s', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/soldado_enemigo.png', { 
        frameWidth: 220, frameHeight: 256, margin: 15, spacing: 0
    });
    
    this.load.spritesheet('tigre_s', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/tigre.png', { 
        frameWidth: 220, frameHeight: 256, margin: 15, spacing: 0
    });
    
    this.load.audio('musica_fondo', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/musica_jungla.mp3');
    this.load.audio('sfx_disparo', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/disparo.mp3');
    this.load.audio('sfx_soldado', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_soldado.mp3');
    this.load.audio('sfx_tigre', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_tigre.mp3');
    this.load.audio('sfx_serpiente', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/muerte_serpiente.mp3');
}

/**
 * BLOQUE 3: INICIALIZACIÓN
 */
function create() {
    this.add.image(window.innerWidth/2, window.innerHeight/2, 'jungla').setDisplaySize(window.innerWidth, window.innerHeight);
    bgMusic = this.sound.add('musica_fondo', { volume: 0.4, loop: true });
    sfxDisparo = this.sound.add('sfx_disparo', { volume: 0.3 });
    sfxSoldado = this.sound.add('sfx_soldado', { volume: 0.6 });
    sfxTigre = this.sound.add('sfx_tigre', { volume: 0.6 });
    sfxSerpiente = this.sound.add('sfx_serpiente', { volume: 0.6 });

    // --- PANEL MILITAR ANCHO ---
    const panelUI = this.add.graphics();
    panelUI.fillStyle(0x222222, 0.7);
    panelUI.fillRect(0, window.innerHeight - CONTROL_PANEL_HEIGHT, window.innerWidth, CONTROL_PANEL_HEIGHT);
    panelUI.lineStyle(4, 0x444444, 1);
    panelUI.lineBetween(0, window.innerHeight - CONTROL_PANEL_HEIGHT, window.innerWidth, window.innerHeight - CONTROL_PANEL_HEIGHT);

    // Flechas de dirección integradas
    const arrowY = window.innerHeight - (CONTROL_PANEL_HEIGHT / 2);
    panelUI.fillStyle(0x888888, 0.5);
    // Izquierda
    panelUI.fillTriangle(30, arrowY, 60, arrowY - 25, 60, arrowY + 25);
    // Derecha
    panelUI.fillTriangle(window.innerWidth - 30, arrowY, window.innerWidth - 60, arrowY - 25, window.innerWidth - 60, arrowY + 25);

    this.add.text(window.innerWidth/2, window.innerHeight - 30, 'ZONA DE CONTROL TÁCTICO', { 
        fontSize: '14px', fill: '#555555', fontStyle: 'bold' 
    }).setOrigin(0.5);

    // Animaciones
    this.anims.create({ key: 'walk_player', frames: this.anims.generateFrameNumbers('soldado_p', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
    this.anims.create({ key: 'walk_enemy', frames: this.anims.generateFrameNumbers('enemigo_s', { start: 0, end: 3 }), frameRate: 8, repeat: -1 });
    this.anims.create({ key: 'run_tiger', frames: this.anims.generateFrameNumbers('tigre_s', { start: 0, end: 3 }), frameRate: 12, repeat: -1 });
    this.anims.create({ key: 'reptar_snake', frames: this.anims.generateFrameNumbers('serpiente_anim', { start: 0, end: 3 }), frameRate: 8, repeat: -1 });

    player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight - PLAYER_V_OFFSET, 'soldado_p');
    player.setScale(0.8).setCollideWorldBounds(true).play('walk_player');
    player.setBodySize(player.width * 0.3, player.height * 0.5, true); 

    bullets = this.physics.add.group({ defaultKey: 'bala' });
    enemyBullets = this.physics.add.group({ defaultKey: 'bala_roja' });
    enemies = this.physics.add.group();
    pickups = this.physics.add.group(); // Grupo para corazones soltados

    scoreText = this.add.text(20, 20, 'BAJAS: 0', { fontSize: '24px', fill: '#fff', stroke: '#000', strokeThickness: 4 });
    missionText = this.add.text(20, 50, 'MISIÓN: JUNGLE FURY', { fontSize: '14px', fill: '#00ff00', fontStyle: 'bold' });
    hearts = this.add.group();
    actualizarCorazones.call(this);

    this.time.addEvent({ delay: 1000, callback: spawnManager, callbackScope: this, loop: true });

    // Controles
    this.input.on('pointerdown', (p) => { 
        if (p.y > window.innerHeight - CONTROL_PANEL_HEIGHT) {
            isFiring = true; 
            if (!musicStarted) { bgMusic.play(); musicStarted = true; }
        }
    });
    this.input.on('pointerup', () => { isFiring = false; });
    this.input.on('pointermove', (p) => {
        if (p.y > window.innerHeight - CONTROL_PANEL_HEIGHT) player.x = p.x;
    });

    // Colisiones
    this.physics.add.overlap(bullets, enemies, hitEnemy, null, this);
    this.physics.add.overlap(player, enemies, takeDamage, null, this);
    this.physics.add.overlap(player, enemyBullets, takeDamage, null, this);
    this.physics.add.overlap(player, pickups, collectPickup, null, this);
}

/**
 * BLOQUE 4: GESTIÓN DE ENEMIGOS Y DIFICULTAD
 */
function spawnManager() {
    let nivelDificultad = Math.min(Math.floor(score / 50), 10);
    let randomSpawn = Math.random() * 100;
    let limiteSoldado = 33 + (nivelDificultad * 5); 
    
    let tipo = randomSpawn < limiteSoldado ? 'enemigo_soldado' : (randomSpawn < limiteSoldado + (100 - limiteSoldado) / 2 ? 'tigre' : 'serpiente');
    spawnEnemy.call(this, tipo, nivelDificultad);
}

function spawnEnemy(tipo, nivel) {
    const x = Phaser.Math.Between(80, window.innerWidth - 80);
    let enemy = enemies.create(x, -50, tipo === 'enemigo_soldado' ? 'enemigo_s' : (tipo === 'tigre' ? 'tigre_s' : 'serpiente_anim')).setScale(0.7);
    
    if (tipo === 'enemigo_soldado') {
        enemy.play('walk_enemy');
        enemy.setVelocityY(120 + (nivel * 5));
        let rangoIA = 100 + (nivel * 25);
        this.tweens.add({ targets: enemy, x: enemy.x + (Math.random() < 0.5 ? -rangoIA : rangoIA), duration: Math.max(2000 - (nivel * 100), 800), yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        this.time.addEvent({ delay: Phaser.Math.Between(1600, 2600), callback: () => { if (enemy.active) { let eb = enemyBullets.get(enemy.x, enemy.y + 40); if (eb) eb.setActive(true).setVisible(true).setScale(0.18).setVelocityY(480); } }, loop: true });
    } else if (tipo === 'tigre') {
        enemy.play('run_tiger').setVelocityY(420);
        enemy.setBodySize(enemy.width * 0.4, enemy.height * 0.5, true);
    } else {
        enemy.play('reptar_snake').setVelocityY(180);
        this.tweens.add({ targets: enemy, x: enemy.x + 70, duration: 500, yoyo: true, repeat: -1 });
        enemy.setBodySize(enemy.width * 0.3, enemy.height * 0.4, true);
    }
    enemy.tipoEnemigo = tipo;
}

/**
 * BLOQUE 5: COMBATE Y ITEMS
 */
function hitEnemy(b, e) {
    if (e.tipoEnemigo === 'enemigo_soldado') sfxSoldado.play();
    else if (e.tipoEnemigo === 'tigre') sfxTigre.play();
    else sfxSerpiente.play();

    // Probabilidad de soltar corazón (10%)
    if (Math.random() < 0.2) {
        let h = pickups.create(e.x, e.y, 'corazon').setScale(0.06);
        h.setVelocityY(100);
    }

    b.destroy(); e.destroy();
    score += 10;
    scoreText.setText('BAJAS: ' + score);
}

function takeDamage(p, obj) {
    obj.destroy();
    lives--;
    actualizarCorazones.call(this);
    player.setTint(0xff0000);
    this.time.delayedCall(200, () => player.clearTint());
    if (lives <= 0) endGame.call(this);
}

function collectPickup(p, item) {
    item.destroy();
    if (lives < 3) {
        lives++;
        actualizarCorazones.call(this);
    }
}

/**
 * BLOQUE 6: UI Y FINAL
 */
function update(time) {
    if (isFiring && time > lastFired) {
        let b = bullets.get(player.x, player.y - 60);
        if (b) { b.setActive(true).setVisible(true).setScale(0.18).setVelocityY(-850); sfxDisparo.play(); }
        lastFired = time + FIRE_RATE;
    }
    [bullets, enemyBullets, enemies, pickups].forEach(group => {
        group.children.each(c => { if (c.active && (c.y < -100 || c.y > window.innerHeight + 100)) c.destroy(); });
    });
}

function actualizarCorazones() {
    hearts.clear(true, true);
    for (let i = 0; i < lives; i++) hearts.create(window.innerWidth - 40 - (i * 35), 35, 'corazon').setScale(0.05);
}

function endGame() {
    this.physics.pause();
    if (bgMusic) bgMusic.stop();
    let scores = JSON.parse(localStorage.getItem('gun4fun_ranking')) || [];
    scores.push(score); scores.sort((a, b) => b - a);
    localStorage.setItem('gun4fun_ranking', JSON.stringify(scores.slice(0, 5)));
    let text = `OPERACIÓN FALLIDA\n\nBAJAS: ${score}\n\nTOP 5:\n` + scores.slice(0,5).map((s, i) => `${i+1}. ${s} pts`).join('\n');
    this.add.rectangle(window.innerWidth/2, window.innerHeight/2, 400, 500, 0x000000, 0.8).setOrigin(0.5);
    this.add.text(window.innerWidth/2, window.innerHeight/2 - 50, text, { fontSize: '22px', fill: '#fff', align: 'center' }).setOrigin(0.5);
    const btnRetry = this.add.text(window.innerWidth/2, window.innerHeight/2 + 180, ' VOLVER A INTENTAR ', { fontSize: '28px', fill: '#000', backgroundColor: '#00ff00', padding: { x: 20, y: 10 }, fontStyle: 'bold' }).setOrigin(0.5).setInteractive();
    btnRetry.on('pointerdown', () => location.reload());
}

</script>
</body>
</html>
