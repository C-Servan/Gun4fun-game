<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gun4fun Sky Strike</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 18px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span> | LIVES: <span id="lives">3</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let lives = 3;
        let gameActive = true;

        const player = { x: canvas.width / 2, y: canvas.height - 100, w: 40, h: 40, color: '#00ff00' };
        const bullets = [];
        const enemies = [];

        // Controles táctiles
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            player.x = touch.clientX - player.w / 2;
        });

        function spawnEnemy() {
            if (!gameActive) return;
            enemies.push({ x: Math.random() * (canvas.width - 30), y: -30, w: 30, h: 30, speed: 2 + Math.random() * 3 });
            setTimeout(spawnEnemy, 1000);
        }

        function shoot() {
            if (!gameActive) return;
            bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
            setTimeout(shoot, 300);
        }

        function update() {
            if (!gameActive) return;

            // Mover balas
            bullets.forEach((b, i) => {
                b.y -= 7;
                if (b.y < 0) bullets.splice(i, 1);
            });

            // Mover enemigos
            enemies.forEach((e, i) => {
                e.y += e.speed;
                if (e.y > canvas.height) { enemies.splice(i, 1); lives--; }

                // Colisión bala-enemigo
                bullets.forEach((b, bi) => {
                    if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                        enemies.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 100;
                        document.getElementById('score').innerText = score;
                    }
                });
            });

            if (lives <= 0) {
                gameActive = false;
                alert("MISIÓN FALLIDA. Puntos: " + score);
                location.reload();
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar jugador (Nave)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Dibujar balas (Láseres)
            ctx.fillStyle = '#ff0';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Dibujar enemigos
            ctx.fillStyle = '#f00';
            enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));

            document.getElementById('lives').innerText = lives;
            update();
            requestAnimationFrame(draw);
        }

        spawnEnemy();
        shoot();
        draw();
    </script>
</body>
</html>
