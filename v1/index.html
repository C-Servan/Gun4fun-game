<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gun4Fun Misión 1: Campo de Entrenamiento</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #2a1a1a; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>

/**
 * BLOQUE 1: CONFIGURACIÓN Y VARIABLES
 */
// ESPACIO RESERVADO: Configuración Firebase y Parámetros
const FIREBASE_DB_URL_M1 = "TU_URL_AQUI/mision1.json"; // Configurar para Misión 1
const urlParams = new URLSearchParams(window.location.search);
const userName = urlParams.get('user') || 'Recluta';

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// Variables de Juego
let crosshair, targets, score = 0, scoreText, missionText;
let ammo = 7, ammoText, isReloading = false;
let bgMusic, sfxDisparo, sfxSargento, sfxAcierto;
let musicStarted = false;

// Configuración de Producción (Basada en tus valores de Censo/hora etc.)
const RELOAD_TIME = 1000; 
const TARGET_SPAWN_RATE = 1500; 
const CONTROL_PANEL_HEIGHT = 180;

/**
 * BLOQUE 2: GESTIÓN DE ACTIVOS
 */
function preload() {
    // ESPACIO RESERVADO: URLs de Assets (Cambiar por tus links de GitHub cuando los tengas)
    this.load.image('fondo_entrenamiento', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/fondo_mision1.jpg'); // Placeholder
    this.load.image('mira', 'https://cdn-icons-png.flaticon.com/512/25/25360.png'); // Icono de mira
    this.load.image('diana_grunt', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/diana_madera.png');
    this.load.image('sargento', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/sargento_pixel.png');
    
    // Audio
    this.load.audio('musica_m1', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/musica_arcade.mp3');
    this.load.audio('sfx_disparo', 'https://raw.githubusercontent.com/C-Servan/Gun4fun-game/main/assets/disparo.mp3');
}

/**
 * BLOQUE 3: INICIALIZACIÓN
 */
function create() {
    // Fondo adaptado a la pantalla actual (Igual que Misión 2)
    this.add.image(window.innerWidth/2, window.innerHeight/2, 'fondo_entrenamiento').setDisplaySize(window.innerWidth, window.innerHeight);

    // Grupos
    targets = this.physics.add.group();

    // UI - Panel de Control Inferior (Misma estética que M2)
    const panelUI = this.add.graphics();
    panelUI.fillStyle(0x222222, 0.8);
    panelUI.fillRect(0, window.innerHeight - CONTROL_PANEL_HEIGHT, window.innerWidth, CONTROL_PANEL_HEIGHT);
    panelUI.lineStyle(4, 0x00ff00, 1);
    panelUI.lineBetween(0, window.innerHeight - CONTROL_PANEL_HEIGHT, window.innerWidth, window.innerHeight - CONTROL_PANEL_HEIGHT);

    this.add.text(window.innerWidth/2, window.innerHeight - (CONTROL_PANEL_HEIGHT / 2) - 20, 'DESLIZA ABAJO PARA RECARGAR', {
        fontSize: '18px', fill: '#00ff00', fontStyle: 'bold', alpha: 0.8
    }).setOrigin(0.5);

    // Textos de estado
    scoreText = this.add.text(20, 20, `${userName.toUpperCase()}: 0`, { fontSize: '24px', fill: '#fff', stroke: '#000', strokeThickness: 4 });
    ammoText = this.add.text(window.innerWidth - 20, 20, `MUNICIÓN: 7/7`, { fontSize: '24px', fill: '#ffff00', stroke: '#000', strokeThickness: 4 }).setOrigin(1, 0);
    missionText = this.add.text(20, 55, 'MISIÓN 1: CAMPO DE ENTRENAMIENTO', { fontSize: '14px', fill: '#00ff00', fontStyle: 'bold' });

    // El Jugador es una mira que sigue al dedo
    crosshair = this.physics.add.sprite(window.innerWidth/2, window.innerHeight/2, 'mira').setScale(0.1).setDepth(10);

    // Eventos de entrada
    this.input.on('pointerdown', (p) => {
        if (!musicStarted) { /* bgMusic.play(); */ musicStarted = true; }
        if (p.y < window.innerHeight - CONTROL_PANEL_HEIGHT) {
            disparar.call(this);
        }
    });

    this.input.on('pointermove', (p) => {
        crosshair.x = p.x;
        crosshair.y = p.y;
    });

    // Gesto de Recarga (Detección de deslizamiento como en M2 pero vertical)
    this.input.on('pointerup', (p) => {
        let swipeDistance = p.y - p.downY;
        if (swipeDistance > 100 && !isReloading) {
            recargar.call(this);
        }
    });

    // Bucle de dianas
    this.time.addEvent({ delay: TARGET_SPAWN_RATE, callback: spawnTarget, callbackScope: this, loop: true });
}

/**
 * BLOQUE 4: LÓGICA DE JUEGO
 */
function spawnTarget() {
    const x = Phaser.Math.Between(50, window.innerWidth - 50);
    const y = Phaser.Math.Between(100, window.innerHeight - CONTROL_PANEL_HEIGHT - 100);
    
    let tipo = Math.random() > 0.8 ? 'sargento' : 'diana_grunt';
    let t = targets.create(x, y, tipo).setScale(0.5);
    t.tipo = tipo;

    // Animación de Pop-up (Aparece y desaparece)
    t.alpha = 0;
    this.tweens.add({
        targets: t,
        alpha: 1,
        duration: 200,
        onComplete: () => {
            this.time.delayedCall(1200, () => {
                if (t.active) t.destroy();
            });
        }
    });
}

function disparar() {
    if (ammo <= 0 || isReloading) return;

    ammo--;
    actualizarInterfaz();
    
    // Feedback visual disparo (Flash)
    let flash = this.add.circle(crosshair.x, crosshair.y, 20, 0xffff00, 0.5);
    this.time.delayedCall(50, () => flash.destroy());

    // Comprobar acierto
    let acierto = false;
    targets.children.each(t => {
        if (t.active && Phaser.Geom.Intersects.RectangleToRectangle(crosshair.getBounds(), t.getBounds())) {
            procesarAcierto.call(this, t);
            acierto = true;
        }
    });
}

function procesarAcierto(target) {
    if (target.tipo === 'sargento') {
        score = Math.max(0, score - 50);
        this.cameras.main.shake(200, 0.02);
        // Aquí iría el grito del sargento
    } else {
        score += 10;
        // Efecto de partículas pixel aquí
    }
    target.destroy();
    actualizarInterfaz();
}

function recargar() {
    isReloading = true;
    ammoText.setText("RECARGANDO...");
    this.time.delayedCall(RELOAD_TIME, () => {
        ammo = 7;
        isReloading = false;
        actualizarInterfaz();
    });
}

function actualizarInterfaz() {
    scoreText.setText(`${userName.toUpperCase()}: ${score}`);
    if (!isReloading) ammoText.setText(`MUNICIÓN: ${ammo}/7`);
}

function update() {
    // Limpieza de objetos fuera de rango (como en M2)
    targets.children.each(c => { if (c.active && c.y > window.innerHeight) c.destroy(); });
}

</script>
</body>
</html>
